<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agentic Breakout</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main class="game-shell">
    <section class="game-panel" aria-label="Breakout game">
      <div class="hud" aria-live="polite">
        <div>
          <span class="label">Score</span>
          <strong id="score" data-testid="score">0</strong>
        </div>
        <div>
          <span class="label">Lives</span>
          <strong id="lives" data-testid="lives">3</strong>
        </div>
        <div>
          <span class="label">State</span>
          <strong id="status" data-testid="status">Ready</strong>
        </div>
      </div>

      <canvas id="game" data-testid="game-canvas" width="960" height="640"></canvas>

      <div class="controls">
        <button id="startButton" type="button">Start</button>
        <button id="pauseButton" type="button">Pause</button>
        <button id="restartButton" type="button">Restart</button>
      </div>
    </section>
  </main>

  <script type="module" src="src/game.js"></script>
</body>
</html>
